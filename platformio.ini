[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv

lib_deps =
    knolleary/PubSubClient @ ^2.8
    madhephaestus/ESP32Servo @ ^3.0.0

build_flags =
    -I ${PROJECT_INCLUDE_DIR}
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192
    -std=c++17

[env:esp32dev_release]
extends = env:esp32dev
build_flags =
    -I ${PROJECT_INCLUDE_DIR}
    -DCORE_DEBUG_LEVEL=0
    -DNDEBUG
    -O2
    -std=c++17

; =============================================================================
; Test / calibration environments — each uses its own src_dir, inherits lib_deps
; Switch via the environment picker in the VS Code status bar before uploading.
; =============================================================================

[env:test_wifi_soak]
; 24-hour WiFi+MQTT stability soak. Publishes uptime/drop-count to HiveMQ every
; 60 s. Run with Serial Monitor to watch reconnects in real time.
extends = env:esp32dev
build_src_filter = -<*> +<../test/wifi_soak/>
build_flags =
    -I ${PROJECT_INCLUDE_DIR}
    -DCORE_DEBUG_LEVEL=3
    -std=c++17

[env:test_audio_cal]
; Goertzel power logger — prints raw power for every block, no threshold gate.
; Connect MAX4466, open Serial Monitor, play 840 Hz tone. Read noise floor vs
; tone level. Set AUDIO_THRESHOLD_DEFAULT in config.h halfway between the two.
extends = env:esp32dev
build_src_filter = -<*> +<../test/audio_cal/>
build_flags =
    -I ${PROJECT_INCLUDE_DIR}
    -DCORE_DEBUG_LEVEL=3
    -std=c++17

[env:test_servo_cal]
; Serial CLI for servo angle discovery. Commands: l <deg>  u <deg>  b <deg>
; L (move to lock)  U (move to unlock)  B (trigger buzzer press)  ? (status)
; Note the angles that look right, then update config.h defaults.
extends = env:esp32dev
build_src_filter = -<*> +<../test/servo_cal/>
build_flags =
    -I ${PROJECT_INCLUDE_DIR}
    -DCORE_DEBUG_LEVEL=3
    -std=c++17
